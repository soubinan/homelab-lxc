metadata:
  name: Paperless-ngx
  get_version_command: curl -s https://api.github.com/repos/paperless-ngx/paperless-ngx/releases/latest | jq -r '.tag_name'
  description: "A community-supported supercharged version of paperless: scan, index and archive all your physical documents."
  categories: Archiving, Digitalization, Documents Management
  project_source: https://github.com/paperless-ngx/paperless-ngx
  distribution: debian
  release: buster
  architectures:
    - amd64
instructions:
  files:
    - path: /etc/systemd/system/paperless-consumer.service
      generator: dump
      content: |-
        [Unit]
        Description=Paperless consumer
        Requires=redis.service

        [Service]
        User=paperless
        Group=paperless
        EnvironmentFile=/opt/paperless/settings.env
        WorkingDirectory=/opt/paperless/src
        ExecStart=/opt/paperless/venv/bin/python manage.py document_consumer

        [Install]
        WantedBy=multi-user.target

    - path: /etc/systemd/system/paperless-scheduler.service
      generator: dump
      content: |-
        [Unit]
        Description=Paperless Celery Beat
        Requires=redis.service

        [Service]
        User=paperless
        Group=paperless
        EnvironmentFile=/opt/paperless/settings.env
        WorkingDirectory=/opt/paperless/src
        ExecStart=/opt/paperless/venv/bin/python -m celery --app paperless beat --loglevel INFO

        [Install]
        WantedBy=multi-user.target

    - path: /etc/systemd/system/paperless-task-queue.service
      generator: dump
      content: |-
        [Unit]
        Description=Paperless Celery Workers
        Requires=redis.service

        [Service]
        User=paperless
        Group=paperless
        EnvironmentFile=/opt/paperless/settings.env
        WorkingDirectory=/opt/paperless/src
        ExecStart=/opt/paperless/venv/bin/python -m celery --app paperless worker --loglevel INFO

        [Install]
        WantedBy=multi-user.target

    - path: /etc/systemd/system/paperless-webserver.service
      generator: dump
      content: |-
        [Unit]
        Description=Paperless webserver
        After=network.target
        Wants=network.target
        Requires=redis.service
        #Requires=paperless-webserver.socket

        [Service]
        User=paperless
        Group=paperless
        EnvironmentFile=/opt/paperless/settings.env
        WorkingDirectory=/opt/paperless/src
        ExecStart=/opt/paperless/venv/bin/python -m gunicorn -c /opt/paperless/gunicorn.conf.py paperless.asgi:application

        [Install]
        WantedBy=multi-user.target

  packages:
    - build-essential
    - python3
    - python3-wheel
    - python3-dev
    - python3-pip
    - python3-venv
    - python3-setuptools
    - fonts-liberation
    - imagemagick
    - libpq-dev
    - libmagic-dev
    - mime-support
    - libzbar0
    - poppler-utils
    - unpaper
    - ghostscript
    - icc-profiles-free
    - qpdf
    - liblept5
    - libxml2
    - pngquant
    - tesseract-ocr
    - tesseract-ocr-eng
    - tesseract-ocr-fra
    - zlib1g
    - pkg-config
    - mariadb-client
    - default-libmysqlclient-dev
    - libpq-dev
    - redis
    - xz-utils
    - git
    - autotools-dev
    - automake
    - libtool
    - libleptonica-dev


  actions:
    - trigger: post-files
      pongo: true
      action: |-
        #!/bin/bash
        set -eux

        adduser paperless --system --home /opt/paperless --group
        mkdir -p /opt/paperless/{media,data,consume}

        curl -sL https://github.com/paperless-ngx/paperless-ngx/releases/download/v{{image.serial}}/paperless-ngx-v{{image.serial}}.tar.xz | tar xv --strip-components=1 -JC /opt/paperless/
        chown paperless:paperless -R /opt/paperless
        cd /opt/paperless
        python3 -m venv venv
        /opt/paperless/venv/bin/python -m pip install -r requirements.txt
        sed -i -e "s|#PAPERLESS_CONSUMPTION_DIR=../consume|PAPERLESS_CONSUMPTION_DIR=/opt/paperless/consume|" /opt/paperless/paperless.conf
        sed -i -e "s|#PAPERLESS_DATA_DIR=../data|PAPERLESS_DATA_DIR=/opt/paperless/data|" /opt/paperless/paperless.conf
        sed -i -e "s|#PAPERLESS_MEDIA_ROOT=../media|PAPERLESS_MEDIA_ROOT=/opt/paperless/media|" /opt/paperless/paperless.conf
        sed -i -e "s|#PAPERLESS_STATICDIR=../static|PAPERLESS_STATICDIR=/opt/paperless/static|" /opt/paperless/paperless.conf

        git clone https://github.com/agl/jbig2enc /tmp/jbig2enc
        cd /tmp/jbig2enc
        ./autogen.sh
        ./configure && make
        make install

        /opt/paperless/venv/bin/python -m nltk.downloader -d /usr/share/nltk_data all

        cd /opt/paperless/src
        DJANGO_SUPERUSER_PASSWORD=admin
        /opt/paperless/venv/bin/python manage.py migrate
        /opt/paperless/venv/bin/python manage.py createsuperuser --username admin --email admin@localhost --noinput

        cat <<EOF >> /opt/paperless/settings.env
        PAPERLESS_SECRET_KEY=$(/usr/bin/openssl rand -hex 16)
        PAPERLESS_OCR_LANGUAGE=eng+fra
        EOF

        systemctl enable paperless-consumer.service
        systemctl enable paperless-scheduler.service
        systemctl enable paperless-task-queue.service
        systemctl enable paperless-webserver.service

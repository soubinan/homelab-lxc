metadata:
  name: Jellyfin
  get_version_command: curl -s https://api.github.com/repos/jellyfin/jellyfin/releases/latest | jq -r '.tag_name'
  description: A Free Software Media System to collect, manage, and stream your media.
  categories: Media management, Streaming
  project_source: https://github.com/jellyfin/jellyfin
  distribution: debian
  release: bookworm
  architectures:
    - amd64
instructions:
  files:
    - path: /etc/systemd/system/jellyfin.service
      generator: dump
      content: |-
        [Unit]
        Description = Jellyfin Media Server
        After = network-online.target

        [Service]
        Type = simple
        EnvironmentFile = /etc/default/jellyfin
        WorkingDirectory = /var/lib/jellyfin
        ExecStart = /usr/bin/jellyfin $JELLYFIN_WEB_OPT $JELLYFIN_RESTART_OPT $JELLYFIN_FFMPEG_OPT $JELLYFIN_SERVICE_OPT $JELLYFIN_NOWEBAPP_OPT $JELLYFIN_ADDITIONAL_OPTS
        Restart = on-failure
        TimeoutSec = 15
        SuccessExitStatus=0 143

        [Install]
        WantedBy = multi-user.target

  actions:
    - trigger: post-files
      pongo: true
      action: |-
        #!/bin/bash
        set -eux

        curl https://repo.jellyfin.org/install-debuntu.sh | sudo bash

        systemctl enable jellyfin.service
